<html>
<head>
    <title>Modern Minimalistic Pen Collection Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f5f5f5; }
        .container { width: 80%; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; color: #333; }
        .pen { border: 1px solid #ddd; border-radius: 5px; padding: 10px; margin: 10px 0; background: #fff; }
        .pen img { max-width: 100px; margin-right: 10px; }
        .pen-details { display: flex; align-items: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Pen Collection Dashboard</h1>
        <div class="pen">
            <div class="pen-details">
                <img src="pen1.jpg" alt="Pen 1">
                <div>
                    <h2>Pen 1 Name</h2>
                    <p>Description of Pen 1.</p>
                </div>
            </div>
        </div>
        <div class="pen">
            <div class="pen-details">
                <img src="pen2.jpg" alt="Pen 2">
                <div>
                    <h2>Pen 2 Name</h2>
                    <p>Description of Pen 2.</p>
                </div>
            </div>
        </div>
        <!-- Add more pens as necessary -->
    </div>
</body>
</html>
