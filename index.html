<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pen Collection Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #f3f4f6, #e5e7eb);
            color: #34495e;
        }
        header {
            background: #2ecc71;
            padding: 20px;
            text-align: center;
            color: white;
            font-size: 2.5em;
        }
        .dashboard {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            padding: 20px;
        }
        .pen-card {
            background: white;
            border: 1px solid #dcdcdc;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            margin: 10px;
            padding: 15px;
            width: 250px;
            text-align: center;
            transition: transform 0.2s;
        }
        .pen-card:hover {
            transform: scale(1.05);
        }
        .search-form {
            margin: 20px;
            display: flex;
            justify-content: center;
        }
        .search-form input[type="text"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 200px;
        }
        .search-form button {
            padding: 10px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            margin-left: 5px;
            cursor: pointer;
        }
        .statistics {
            margin: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>Pen Collection Dashboard</h1>
    </header>
    <form class="search-form">
        <input type="text" placeholder="Search pens..." />
        <button type="submit">Search</button>
    </form>
    <div class="statistics">
        <h2>Total Pens: 50</h2>
        <h2>Your Woodex Pen is pre-loaded!</h2>
    </div>
    <div class="dashboard">
        <div class="pen-card">
            <h3>Woodex Pen</h3>
            <p>Elegant design with smooth writing experience.</p>
        </div>
        <div class="pen-card">
            <h3>Luxury Fountain Pen</h3>
            <p>A classic choice for enthusiasts.</p>
        </div>
        <div class="pen-card">
            <h3>Eco-Friendly Pen</h3>
            <p>Made from recycled materials.</p>
        </div>
        <div class="pen-card">
            <h3>Gel Pen</h3>
            <p>Smooth ink flow, perfect for everyday use.</p>
        </div>
    </div>
</body>
</html>
